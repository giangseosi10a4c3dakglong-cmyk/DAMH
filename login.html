<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f6f9; }
        .card { background: #e8d0f5; padding: 30px; border-radius: 8px; width: 360px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .title { background: #fff; padding: 10px; font-weight: bold; text-align: center; margin-bottom: 25px; border-radius: 4px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .forgot-link { display: block; text-align: right; font-size: 13px; color: #555; text-decoration: none; margin-bottom: 15px; }
        .btn { width: 100%; padding: 10px; background: #fff; border: 1px solid #ccc; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .sso-section { text-align: center; margin-top: 20px; font-size: 14px; color: #555; }
        .sso-buttons { display: flex; justify-content: space-between; margin-top: 10px; }
        .sso-btn { padding: 8px; background: #fff; border: 1px solid #ccc; font-size: 12px; cursor: pointer; width: 30%; border-radius: 4px; text-align: center; text-decoration: none; color: black; }
        .redirect-link { display: block; text-align: center; margin-top: 15px; color: #555; font-size: 13px; text-decoration: none; font-weight: bold;}
    </style>
</head>
<body>

<div class="card">
    <div class="title">ĐĂNG NHẬP</div>
    <form onsubmit="handleLogin(event)">
        <div class="form-group"><input type="text" id="loginUsername" placeholder="Email hoặc tên đăng nhập" required></div>
        <div class="form-group"><input type="password" id="loginPassword" placeholder="Mật Khẩu" required></div>
       <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Quên mật khẩu?</a>
        <button type="submit" class="btn">Đăng Nhập</button>
    </form>
    
    <div class="sso-section">
        <div>hoặc đăng nhập bằng</div>
        <div class="sso-buttons">
            <a href="#" class="sso-btn">Google</a>
            <a href="#" class="sso-btn">Facebook</a>
            <a href="#" class="sso-btn">Apple</a>
        </div>
    </div>
    <a href="register.html" class="redirect-link">Chưa có tài khoản? Đăng ký tại đây</a>
</div>

<script>
    async function handleLogin(event) {
        event.preventDefault();
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;

        try {
            const response = await fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if(response.ok) {
                const data = await response.json();
                // Lưu lại session đăng nhập (Tên User)
                localStorage.setItem('currentUser', JSON.stringify(data.user)); 
                window.location.href = "dashboard.html";
            } else {
                const errMsg = await response.text();
                alert(errMsg);
            }
        } catch(e) {
            alert("Lỗi kết nối máy chủ! Hãy kiểm tra Backend API.");
        }
    }

    async function handleForgotPassword(event) {
    event.preventDefault();
    const usernameOrEmail = prompt("Vui lòng nhập Tên đăng nhập hoặc Email của bạn để cấp lại mật khẩu:");
    
    if (!usernameOrEmail) return;

    try {
        const response = await fetch('http://localhost:3000/api/users/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usernameOrEmail })
        });
        
        if (response.ok) {
            const data = await response.json();
            alert(data.message); // Hiển thị mật khẩu mới cho người dùng (Dùng cho Demo)
        } else {
            const errMsg = await response.text();
            alert("Lỗi: " + errMsg);
        }
    } catch(e) {
        alert("Lỗi kết nối đến máy chủ Backend!");
    }
}

</script>
</body>
</html>

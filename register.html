<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Tài Khoản</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f6f9; }
        .card { background: #00c2a8; padding: 30px; border-radius: 8px; width: 360px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .title { background: #ccc; padding: 10px; font-weight: bold; text-align: center; margin-bottom: 20px; border-radius: 4px; }
        .form-group { margin-bottom: 12px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #ccc; border: 1px solid #aaa; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 4px; }
        .btn:hover { background: #bbb; }
        .sso-section { text-align: center; margin-top: 15px; font-size: 14px; }
        .sso-buttons { display: flex; justify-content: space-between; margin-top: 10px; }
        .sso-btn { padding: 8px; background: #ccc; border: none; font-size: 12px; cursor: pointer; width: 30%; border-radius: 4px; text-align: center; text-decoration: none; color: black; }
        .redirect-link { display: block; text-align: center; margin-top: 15px; color: #fff; font-size: 13px; text-decoration: none; font-weight: bold;}
    </style>
</head>
<body>

<div class="card">
    <div class="title">ĐĂNG KÝ TÀI KHOẢN</div>
    <form onsubmit="handleRegister(event)">
        <div class="form-group"><input type="text" id="fullname" placeholder="Họ & Tên" required></div>
        <div class="form-group"><input type="email" id="email" placeholder="Email" required></div>
        <div class="form-group"><input type="text" id="username" placeholder="Tên đăng nhập" required></div>
        <div class="form-group"><input type="password" id="password" placeholder="Mật khẩu (Tối thiểu 8 ký tự)" minlength="8" required></div>
        <div class="form-group"><input type="password" id="confirmPassword" placeholder="Xác nhận mật khẩu" required></div>
        
        <button type="submit" class="btn">Đăng Ký Tài Khoản</button>
    </form>
    
    <div class="sso-section">
        <div>Hoặc đăng ký bằng</div>
        <div class="sso-buttons">
            <a href="#" class="sso-btn">Google</a>
            <a href="#" class="sso-btn">Facebook</a>
            <a href="#" class="sso-btn">Apple</a>
        </div>
    </div>
    <a href="login.html" class="redirect-link">Đã có tài khoản? Đăng nhập ngay</a>
</div>

<script>
    async function handleRegister(event) {
        event.preventDefault();
        const fullname = document.getElementById('fullname').value;
        const email = document.getElementById('email').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (password !== confirmPassword) {
            alert("Ràng buộc nghiệp vụ: Mật khẩu xác nhận không khớp!");
            return;
        }

        try {
            const response = await fetch('http://localhost:3000/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullname, email, username, password })
            });
            if(response.ok) {
                alert("Đăng ký thành công! Vui lòng tiến hành đăng nhập.");
                window.location.href = "login.html";
            } else {
                const errMsg = await response.text();
                alert("Lỗi: " + errMsg);
            }
        } catch(e) {
            alert("Lỗi kết nối máy chủ! Hãy kiểm tra Backend API.");
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xem Lịch Họp Cá Nhân</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; }
        .header { background: #2ecc71; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; margin-bottom: 20px; }
        .logo-box { background: #9b59b6; color: #f1c40f; padding: 8px 15px; font-weight: bold; border-radius: 4px; cursor: pointer;}
        .user-avatar { background: #f1c40f; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; color: black; }
        
        /* Dropdown CSS cho Avatar */
        .dropdown { position: relative; display: inline-block; cursor: pointer; }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: #f9f9f9; min-width: 170px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1; border-radius: 4px;}
        .dropdown-content a { color: black; padding: 12px 16px; text-decoration: none; display: block; border-bottom: 1px solid #ddd; font-size: 13px;}
        .dropdown-content a:hover { background-color: #f1f1f1; }
        .dropdown:hover .dropdown-content { display: block; }

        .filter-bar { background: #e74c3c; padding: 15px; display: flex; gap: 10px; align-items: center; border-radius: 4px 4px 0 0; }
        .btn-action { background: #2ecc71; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 4px; text-decoration: none; color: black; }
        .search-input, .select-filter { padding: 8px; border: none; border-radius: 4px; }
        .search-input { flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .status-badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; color: white; display: inline-block; }
        .status-green { background: #2ecc71; }
        .status-red { background: #e74c3c; }
        .status-yellow { background: #f1c40f; color: black; }
        .op-btn { padding: 6px 10px; font-weight: bold; border: none; cursor: pointer; border-radius: 4px; margin-right: 4px; }
        .btn-cancel { background: #e74c3c; color: white; }

        /* CSS cho Cửa sổ Modal */
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 10% auto; padding: 20px; border-radius: 8px; width: 350px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .modal-header { font-weight: bold; font-size: 18px; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .modal-close { float: right; cursor: pointer; font-size: 18px; color: #e74c3c; font-weight: bold; border: none; background: none;}
        .modal input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        .modal-btn { width: 100%; padding: 10px; font-weight: bold; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-save { background: #2ecc71; }
        .btn-warning { background: #f39c12; }

    </style>
    <div id="profileModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal('profileModal')">X</button>
        <div class="modal-header">Cập Nhật Thông Tin</div>
        <form onsubmit="updateProfile(event)">
            <label>Họ và Tên</label>
            <input type="text" id="editFullName" required>
            <label>Email</label>
            <input type="email" id="editEmail" required>
            <button type="submit" class="modal-btn btn-save">Lưu Thay Đổi</button>
        </form>
    </div>
</div>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal('passwordModal')">X</button>
        <div class="modal-header">Đổi Mật Khẩu</div>
        <form onsubmit="changePassword(event)">
            <input type="password" id="oldPassword" placeholder="Mật khẩu hiện tại" required>
            <input type="password" id="newPassword" placeholder="Mật khẩu mới (Tối thiểu 8 ký tự)" minlength="8" required>
            <input type="password" id="confirmNewPassword" placeholder="Xác nhận mật khẩu mới" required>
            <button type="submit" class="modal-btn btn-warning">Xác Nhận Đổi</button>
        </form>
    </div>
</div>
</head>
<body>

<div class="header">
    <a href="dashboard.html" style="text-decoration: none;">
        <div class="logo-box">LOGO CTY XYZ</div>
    </a>
    
    <div class="dropdown">
        <div class="user-avatar" id="avatarName">👤 Khách ▾</div>
        <div class="dropdown-content">
            <a href="#" onclick="openModal('profileModal')">Cập nhật thông tin cá nhân</a>
            <a href="#" onclick="openModal('passwordModal')">Đổi mật khẩu</a>
            <a href="login.html" onclick="localStorage.removeItem('currentUser')">Đăng xuất</a>
        </div>
    </div>
</div>

<div class="filter-bar">
    <a href="create-meeting.html" class="btn-action">Tạo lịch mới</a>
    <input type="text" id="searchInput" class="search-input" placeholder="Tìm tên cuộc họp / người tổ chức..." onkeyup="filterMeetings()">
    <input type="text" id="roomInput" class="search-input" placeholder="Tìm kiếm phòng họp..." onkeyup="filterMeetings()">
</div>

<table>
    <thead>
        <tr>
            <th>Tên cuộc họp</th>
            <th>Người tổ chức</th>
            <th>Thời gian bắt đầu</th>
            <th>Phòng</th>
            <th>Tình trạng</th>
            <th>Thao tác</th>
        </tr>
    </thead>
    <tbody id="data-rows">
        <!-- Render từ DB -->
    </tbody>
</table>

<script>
    // Kiểm tra đăng nhập
    document.addEventListener("DOMContentLoaded", () => {
        const userStr = localStorage.getItem('currentUser');
        if(userStr) {
            const user = JSON.parse(userStr);
            document.getElementById('avatarName').innerText = "👤 " + user.FullName + " ▾";
            loadMeetings("", ""); // Load dữ liệu
        } else {
            window.location.href = "login.html"; // Ép về trang đăng nhập
        }
    });

    function formatDateTime(dateTimeStr) {
        const date = new Date(dateTimeStr);
        return date.toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    async function loadMeetings(textFilter = "", roomFilter = "") {
        try {
            const response = await fetch('http://localhost:3000/api/meetings');
            const list = await response.json();
            
            const tbody = document.getElementById('data-rows');
            tbody.innerHTML = "";
            textFilter = textFilter.toLowerCase();
            roomFilter = roomFilter.toLowerCase();

            list.forEach((m) => {
    const matchText = m.Title.toLowerCase().includes(textFilter) || m.Creator.toLowerCase().includes(textFilter);
    const matchRoom = m.Room.toLowerCase().includes(roomFilter);

    if (matchText && matchRoom) {
        let badgeClass = m.Status === "Đồng ý" ? "status-green" : (m.Status === "Từ chối" ? "status-red" : "status-yellow");
        
        // --- LOGIC PHÂN QUYỀN NÚT BẤM ---
        const currentUser = JSON.parse(localStorage.getItem('currentUser')).FullName;
        let actionContent = "";

        // Nếu là NGƯỜI TẠO (Creator): Chỉ hiện Hủy lịch
        if (m.Creator === currentUser) {
            actionContent = `<button class="op-btn btn-cancel" onclick="deleteMeeting(${m.MeetingID})">Hủy lịch</button>`;
        } 
        // Nếu là NGƯỜI ĐƯỢC MỜI và đang chờ xác nhận: Hiện nút Đồng ý/Từ chối
        else if (m.Status === "Chờ xác nhận") {
            actionContent = `
                <button class="op-btn" style="background:#2ecc71; color:white;" onclick="updateStatus(${m.MeetingID}, 'Đồng ý')">✓ Đồng ý</button>
                <button class="op-btn btn-cancel" onclick="updateStatus(${m.MeetingID}, 'Từ chối')">X Từ chối</button>
            `;
        }

        tbody.innerHTML += `
            <tr>
                <td><strong>${m.Title}</strong></td>
                <td>${m.Creator}</td>
                <td>${formatDateTime(m.StartTime)}</td>
                <td>${m.Room}</td>
                <td><span class="status-badge ${badgeClass}">${m.Status}</span></td>
                <td>${actionContent}</td>
            </tr>
        `;
    }
});
        } catch (error) {
            console.error("Lỗi tải dữ liệu:", error);
        }
    }

    window.deleteMeeting = async function(id) {
        if(confirm("Bạn có chắc chắn muốn hủy bỏ cuộc họp này?")) {
            await fetch(`http://localhost:3000/api/meetings/${id}`, { method: 'DELETE' });
            filterMeetings(); 
        }
    };
    window.updateStatus = async function(id, newStatus) {
    if(confirm(`Bạn có chắc chắn muốn chuyển trạng thái thành: ${newStatus}?`)) {
        try {
            await fetch(`http://localhost:3000/api/meetings/${id}/status`, { 
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });
            // Tải lại bảng sau khi cập nhật
            filterMeetings(); 
        } catch (err) {
            alert("Lỗi khi cập nhật trạng thái!");
        }
    }
};

    function filterMeetings() {
        const textSearch = document.getElementById('searchInput').value;
        const roomSearch = document.getElementById('roomInput').value;
        loadMeetings(textSearch, roomSearch);
    }

// --- LOGIC XỬ LÝ MODAL QUẢN LÝ TÀI KHOẢN ---

function openModal(modalId) {
    document.getElementById(modalId).style.display = 'block';
    
    // Nếu mở modal Profile, tự động điền thông tin hiện tại vào form
    if(modalId === 'profileModal') {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        document.getElementById('editFullName').value = user.FullName;
        document.getElementById('editEmail').value = user.Email;
    }
}

function closeModal(modalId) {
    document.getElementById(modalId).style.display = 'none';
}

// Xử lý Cập nhật thông tin
async function updateProfile(event) {
    event.preventDefault();
    const user = JSON.parse(localStorage.getItem('currentUser'));
    const newFullName = document.getElementById('editFullName').value;
    const newEmail = document.getElementById('editEmail').value;

    try {
        const response = await fetch('http://localhost:3000/api/users/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user.Username, newFullName, newEmail })
        });
        
        if(response.ok) {
            alert("Cập nhật thông tin thành công!");
            // Cập nhật lại localStorage và giao diện
            user.FullName = newFullName;
            user.Email = newEmail;
            localStorage.setItem('currentUser', JSON.stringify(user));
            document.getElementById('avatarName').innerText = "👤 " + user.FullName + " ▾";
            closeModal('profileModal');
        } else {
            alert("Lỗi: " + await response.text());
        }
    } catch(e) {
        alert("Lỗi kết nối máy chủ!");
    }
}

// Xử lý Đổi mật khẩu
async function changePassword(event) {
    event.preventDefault();
    const user = JSON.parse(localStorage.getItem('currentUser'));
    const oldPassword = document.getElementById('oldPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmNewPassword = document.getElementById('confirmNewPassword').value;

    if(newPassword !== confirmNewPassword) {
        alert("Mật khẩu mới và Xác nhận mật khẩu không khớp!");
        return;
    }

    try {
        const response = await fetch('http://localhost:3000/api/users/change-password', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user.Username, oldPassword, newPassword })
        });
        
        if(response.ok) {
            alert("Đổi mật khẩu thành công! Vui lòng đăng nhập lại.");
            localStorage.removeItem('currentUser'); // Xóa phiên đăng nhập
            window.location.href = 'login.html';   // Đẩy ra trang login
        } else {
            alert("Lỗi: " + await response.text());
        }
    } catch(e) {
        alert("Lỗi kết nối máy chủ!");
    }
}

</script>
</body>
</html>
